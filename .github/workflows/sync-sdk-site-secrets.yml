name: Sync SDK site secrets

# Copies SDK Hostinger FTP secrets from this repo to langstitch-sdk-site.
# Run manually after creating langstitch-sdk-site (workflow_dispatch).

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Push FTP secrets to langstitch-sdk-site
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.SDK_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.SDK_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_PAT secret is missing on langstitch-site."
            exit 1
          fi
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD; do
            eval "value=\$$name"
            if [ -z "${value:-}" ]; then
              echo "::error::Missing source secret for $name"
              exit 1
            fi
          done
          gh secret set FTP_SERVER --repo LangStitch/langstitch-sdk-site --body "$FTP_SERVER"
          gh secret set FTP_USERNAME --repo LangStitch/langstitch-sdk-site --body "$FTP_USERNAME"
          gh secret set FTP_PASSWORD --repo LangStitch/langstitch-sdk-site --body "$FTP_PASSWORD"
          echo "Secrets synced to LangStitch/langstitch-sdk-site"
