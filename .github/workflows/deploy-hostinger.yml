name: Deploy to Hostinger

# Publishes the static site to Hostinger (the live host for langstitch.com)
# over FTPS on every push to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    - Hostinger FTP host (e.g. ftp.langstitch.com or the IP)
#   FTP_USERNAME  - FTP account username
#   FTP_PASSWORD  - FTP account password
# Optional repository variable:
#   FTP_SERVER_DIR - target docroot (defaults to public_html/)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy main site via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || 'public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md

      # The SDK docs live at the sdk.langstitch.com subdomain, whose docroot is a
      # sibling of public_html (default sdk/). Mirror the sdk/ folder there too so the
      # subdomain serves the docs, not just langstitch.com/sdk/.
      - name: Deploy SDK docs to sdk subdomain via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./sdk/
          server-dir: ${{ vars.SDK_SERVER_DIR || 'sdk/' }}
