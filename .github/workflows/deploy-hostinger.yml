name: Deploy to Hostinger

# Publishes langstitch.com (+ sdk.langstitch.com docs) to Hostinger over FTPS.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    - Hostinger FTP IP from hPanel Plan Details
#   FTP_USERNAME  - FTP account username
#   FTP_PASSWORD  - FTP account password
# Optional repository variables:
#   FTP_SERVER_DIR - main site docroot (default: domains/langstitch.com/public_html/)
#   SDK_SERVER_DIR - SDK subdomain docroot (default: domains/sdk.langstitch.com/public_html/)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy main site via FTPS
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || 'domains/langstitch.com/public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md

      - name: Deploy SDK docs to sdk subdomain via FTPS
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./sdk/
          server-dir: ${{ vars.SDK_SERVER_DIR || 'domains/sdk.langstitch.com/public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
