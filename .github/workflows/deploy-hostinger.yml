name: Deploy to Hostinger

# Publishes langstitch.com to Hostinger over FTPS.
# FTP account u743467360.langstitchdeveloper is scoped to the domain docroot (deploy to ./).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Remove stale copies above FTP home
        if: steps.ftp.outputs.configured == 'true'
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ftp:ssl-force true
          set ssl:verify-certificate no
          cd ..
          rm -f index.html styles.css
          bye
          EOF

      - name: Deploy site files to domain root
        if: steps.ftp.outputs.configured == 'true'
        id: ftps
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          timeout: 120000
          state-name: langstitch-domain-root-v2
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .nojekyll

      - name: Verify live site
        if: steps.ftp.outputs.configured == 'true' && steps.ftps.outcome == 'success'
        run: |
          set -euo pipefail
          URL="https://langstitch.com/"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" "$URL" 2>/dev/null || true)"
            if echo "$BODY" | grep -q 'hero--xtra'; then
              echo "Live site OK at $URL (attempt $i)."
              exit 0
            fi
            echo "Waiting for langstitch.com to update (attempt $i/6)…"
            sleep 15
          done
          echo "::error::langstitch.com/ still serves the old build. In hPanel, delete orphan index.html above public_html or set the document root to the FTP account folder."
          exit 1
