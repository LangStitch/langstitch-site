name: Deploy to Hostinger

# Publishes langstitch.com to Hostinger over FTPS.
# The scoped FTP account lands above the live docroot — static files go to
# public_html/ and hostinger-root.htaccess is published as /.htaccess to rewrite.
#
# Required secrets:
#   FTP_SERVER    - 217.21.84.75
#   FTP_USERNAME  - u743467360.langstitchdeveloper
#   FTP_PASSWORD  - FTP account password

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy site files to public_html
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/
          timeout: 120000
          state-name: langstitch-public-html
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            hostinger-root.htaccess
            .htaccess

      - name: Prepare account-root rewrite
        if: steps.ftp.outputs.configured == 'true'
        run: |
          mkdir -p _hostinger-root
          cp hostinger-root.htaccess _hostinger-root/.htaccess

      - name: Deploy account-root rewrite
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: _hostinger-root/
          server-dir: ./
          timeout: 120000
          state-name: langstitch-root-rewrite

      - name: Verify live site
        if: steps.ftp.outputs.configured == 'true'
        run: |
          set -euo pipefail
          URL="https://langstitch.com/"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$URL" || true)"
            if echo "$BODY" | grep -q 'hero--xtra'; then
              echo "Live site OK — redesign marker found (attempt $i)."
              exit 0
            fi
            echo "Waiting for CDN/cache (attempt $i/6)…"
            sleep 15
          done
          echo "::error::https://langstitch.com/ is not serving the latest index.html (missing hero--xtra)."
          exit 1
