name: Deploy to Hostinger

# Mirror to Hostinger public_html/ (scoped FTP account). Primary delivery is GitHub Pages.
# The live docroot for langstitch.com is outside this FTP account — use GitHub Pages DNS.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy site files to public_html
        if: steps.ftp.outputs.configured == 'true'
        continue-on-error: true
        id: ftps
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/
          timeout: 120000
          state-name: langstitch-public-html-v2
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            hostinger-root.htaccess
            .nojekyll

      - name: Verify Hostinger mirror
        if: steps.ftp.outputs.configured == 'true' && steps.ftps.outcome == 'success'
        run: |
          set -euo pipefail
          URL="https://langstitch.com/public_html/index.html"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" "$URL" 2>/dev/null || true)"
            if echo "$BODY" | grep -q 'hero--xtra'; then
              echo "Hostinger mirror OK at $URL (attempt $i)."
              exit 0
            fi
            echo "Waiting for Hostinger mirror (attempt $i/6)…"
            sleep 15
          done
          echo "::warning::Hostinger mirror not verified at $URL — primary delivery is GitHub Pages. Point langstitch.com DNS to GitHub Pages (see README)."
