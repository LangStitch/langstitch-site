name: Deploy to Hostinger

# Publishes langstitch.com to Hostinger over FTPS.
# FTP account u743467360.langstitchdeveloper is scoped to the langstitch.com docroot (deploy to ./).
#
# Required secrets:
#   FTP_SERVER    - 217.21.84.75 (Hostinger FTP IP — no ftp:// prefix)
#   FTP_USERNAME  - u743467360.langstitchdeveloper
#   FTP_PASSWORD  - FTP account password
# Optional variable:
#   FTP_SERVER_DIR - default ./

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy main site via FTPS
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          timeout: 120000
          state-name: langstitch-webroot-v1
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md

      - name: Verify live site
        if: steps.ftp.outputs.configured == 'true'
        run: |
          set -euo pipefail
          URL="https://langstitch.com/"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$URL" || true)"
            if echo "$BODY" | grep -q 'hero--xtra'; then
              echo "Live site OK — redesign marker found (attempt $i)."
              exit 0
            fi
            echo "Waiting for CDN/cache (attempt $i/6)…"
            sleep 15
          done
          echo "::error::https://langstitch.com/ is not serving the latest index.html (missing hero--xtra)."
          exit 1
